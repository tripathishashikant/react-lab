name: CI (Build Check)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Yeh environment variable warning ko khatam kar dega aur Node 24 use karega
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Yahan 20 ki jagah 24 kar dijiye
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
